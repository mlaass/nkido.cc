[build]
  command = "bun install && bun run build"
  publish = "build"

[build.environment]
  BUN_VERSION = "1.1.34"
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"

# 404 fallback — every real route is prerendered; anything else gets the 404 page.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # img-src allows live.nkido.cc so embed previews can load posters; frame-src allows
    # embedding the live IDE iframe on the landing page (see LiveEmbed.svelte).
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https://live.nkido.cc; script-src 'self' 'unsafe-inline' https://gc.zgo.at; style-src 'self' 'unsafe-inline'; frame-src https://live.nkido.cc; connect-src 'self' https://nkido.goatcounter.net;"
