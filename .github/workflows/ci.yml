name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Minimum permissions — read-only checkout, no write anywhere.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Check + build + link-check + Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Mirror + CONTRIBUTING + Releases fetches use this; also keeps the
      # GitHub raw + API rate limit at 5000/h instead of the IP-based 60.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.34'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Install lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --base build/ --no-progress 'build/**/*.html'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lighthouse CI
        run: |
          bun x @lhci/cli@0.14 autorun
